<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1E3A8A" />
<title>Vehicle Inspection Report · My Mechanic QLD</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>

<style>
  /* ───────────────────────────────────────────────────────────────────
     My Mechanic QLD — Vehicle Inspection Report Generator
     Mobile-first. Inspectors fill it out on a phone in the driveway,
     capture photos with the device camera, then export a branded PDF.
     ─────────────────────────────────────────────────────────────────── */

  :root {
    --navy: #1E3A8A;
    --navy-hover: #1E40AF;
    --navy-bright: #2563EB;
    --navy-tint: #E8EEFB;
    --navy-deep: #1A2E6E;

    --bg: #FAFAF8;
    --soft: #F5F4EF;
    --surface: #FFFFFF;
    --ink: #0C0A09;
    --ink-2: #1C1917;
    --muted: #44403C;
    --subtle: #78716C;
    --hairline: #E7E5E0;
    --strong-border: #D6D3CB;

    --grade-good-bg:   #DCFCE7;
    --grade-good-fg:   #166534;
    --grade-fair-bg:   #FED7AA;
    --grade-fair-fg:   #9A3412;
    --grade-repair-bg: #FECACA;
    --grade-repair-fg: #991B1B;
    --grade-na-bg:     #E5E5E5;
    --grade-na-fg:     #525252;

    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;

    --shadow-sm: 0 1px 2px rgba(12, 10, 9, 0.04);
    --shadow: 0 1px 3px rgba(12, 10, 9, 0.06), 0 4px 14px rgba(12, 10, 9, 0.05);
    --shadow-lg: 0 8px 28px rgba(12, 10, 9, 0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    font-size: 14px;
  }
  button, input, textarea, select { font: inherit; color: inherit; }

  /* ───────────── App chrome ───────────── */

  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--hairline);
    backdrop-filter: saturate(180%) blur(8px);
  }
  .app-header__inner {
    max-width: 1480px;
    margin: 0 auto;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 800; letter-spacing: -0.01em; font-size: 15.5px;
    color: var(--ink); text-decoration: none;
  }
  .brand__mark {
    width: 34px; height: 34px; border-radius: 8px; background: var(--navy);
    display: grid; place-items: center; box-shadow: var(--shadow-sm); flex-shrink: 0;
  }
  .brand__mark img { width: 24px; height: 24px; }
  .brand__sub {
    font-weight: 500; color: var(--subtle); font-size: 11.5px; letter-spacing: 0;
    margin-left: 2px;
  }
  .brand__sub::before { content: '·'; margin: 0 6px; color: var(--strong-border); }
  @media (max-width: 540px) {
    .brand__sub { display: none; }
    .brand { font-size: 14px; }
  }

  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn {
    appearance: none; border: 1px solid var(--strong-border); background: var(--surface);
    color: var(--ink); padding: 8px 12px; border-radius: var(--radius);
    font-weight: 600; font-size: 13px; cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap; box-shadow: var(--shadow-sm);
  }
  .btn:hover { background: var(--soft); border-color: var(--navy); }
  .btn:active { transform: translateY(1px); }
  .btn--primary { background: var(--navy); color: white; border-color: var(--navy); }
  .btn--primary:hover { background: var(--navy-hover); border-color: var(--navy-hover); }
  .btn--ghost { background: transparent; border-color: transparent; box-shadow: none; }
  .btn--ghost:hover { background: var(--soft); border-color: var(--hairline); }
  .btn-label { display: inline; }
  @media (max-width: 540px) {
    .btn-label { display: none; }
    .btn { padding: 8px 10px; }
  }

  /* ───────────── Layout ───────────── */

  .app-main {
    max-width: 1480px;
    margin: 0 auto;
    padding: 16px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 1180px) {
    .app-main { grid-template-columns: 1fr; }
    .preview-panel { display: none; }
    .preview-panel[data-show='true'] {
      display: block;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--soft);
      padding: 12px;
      overflow: auto;
    }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .form-panel { padding: 0; }

  /* Section accordion */
  .sec {
    border-bottom: 1px solid var(--hairline);
  }
  .sec:last-child { border-bottom: 0; }
  .sec__head {
    width: 100%;
    text-align: left;
    appearance: none;
    background: var(--surface);
    border: 0;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer;
    color: var(--ink);
  }
  .sec__head:hover { background: var(--soft); }
  .sec__head[data-open='true'] {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    color: white;
  }
  .sec__head-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .sec__num {
    width: 26px; height: 26px; border-radius: 6px;
    background: var(--soft); color: var(--ink);
    font-weight: 800; font-size: 13px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .sec__head[data-open='true'] .sec__num {
    background: rgba(255,255,255,0.2); color: white;
  }
  .sec__title {
    font-weight: 700; font-size: 15px;
    letter-spacing: -0.005em;
  }
  .sec__chev {
    transition: transform 0.2s ease;
    color: var(--subtle);
  }
  .sec__head[data-open='true'] .sec__chev {
    color: white;
    transform: rotate(180deg);
  }
  .sec__body {
    display: none;
    padding: 4px 20px 22px;
  }
  .sec__body[data-open='true'] { display: block; }

  /* Form fields (shared with invoice tool) */
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .field label {
    font-size: 12.5px; font-weight: 600; color: var(--muted);
  }
  .field input, .field textarea, .field select {
    appearance: none;
    border: 1px solid var(--strong-border);
    background: var(--surface);
    color: var(--ink);
    padding: 10px 12px;
    border-radius: var(--radius);
    font-size: 14px;
    width: 100%;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--navy);
    box-shadow: 0 0 0 3px var(--navy-tint);
  }
  .field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }

  /* ───────────── Criteria grid (the heart of the form) ─────────────
     Each criterion has a label and a grade selector (4 pills).
     Tap to cycle, or tap a specific pill. Default Fair.
     ─────────────────────────────────────────────────────────────────── */

  .criteria {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 14px;
    margin-bottom: 14px;
  }
  @media (max-width: 700px) {
    .criteria { grid-template-columns: 1fr; }
  }
  .crit {
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    padding: 8px 10px 10px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .crit__label {
    font-weight: 600;
    font-size: 13.5px;
    color: var(--ink);
    line-height: 1.3;
  }
  .crit__pills {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 4px;
  }
  .crit__pill {
    appearance: none;
    border: 1px solid var(--strong-border);
    background: var(--surface);
    color: var(--muted);
    padding: 6px 4px;
    border-radius: 6px;
    font-size: 11.5px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.12s ease;
    line-height: 1.2;
  }
  .crit__pill:hover { background: var(--soft); }
  .crit__pill[data-active='true'][data-grade='Good']   { background: var(--grade-good-bg);   color: var(--grade-good-fg);   border-color: var(--grade-good-fg); }
  .crit__pill[data-active='true'][data-grade='Fair']   { background: var(--grade-fair-bg);   color: var(--grade-fair-fg);   border-color: var(--grade-fair-fg); }
  .crit__pill[data-active='true'][data-grade='Repair'] { background: var(--grade-repair-bg); color: var(--grade-repair-fg); border-color: var(--grade-repair-fg); }
  .crit__pill[data-active='true'][data-grade='NA']     { background: var(--grade-na-bg);     color: var(--grade-na-fg);     border-color: var(--grade-na-fg); }

  /* "Set all" controls */
  .sec__bulk {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0 14px;
    padding: 10px 12px;
    background: var(--navy-tint);
    border-radius: var(--radius);
    font-size: 12.5px;
    color: var(--navy-deep);
    flex-wrap: wrap;
  }
  .sec__bulk-label { font-weight: 600; margin-right: 4px; }
  .sec__bulk-btn {
    appearance: none;
    border: 1px solid transparent;
    background: var(--surface);
    color: var(--navy);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11.5px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s ease;
  }
  .sec__bulk-btn:hover { background: var(--navy); color: white; }

  /* ───────────── Image upload ───────────── */

  .image-uploader {
    border: 2px dashed var(--strong-border);
    border-radius: var(--radius);
    padding: 18px;
    text-align: center;
    background: var(--soft);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .image-uploader:hover { border-color: var(--navy); background: var(--navy-tint); }
  .image-uploader.dragging { border-color: var(--navy); background: var(--navy-tint); }
  .image-uploader__icon { color: var(--navy); margin-bottom: 6px; }
  .image-uploader__title { font-weight: 700; font-size: 14px; }
  .image-uploader__hint { font-size: 12.5px; color: var(--subtle); margin-top: 4px; line-height: 1.45; }
  .image-uploader input[type='file'] { display: none; }

  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    margin-top: 12px;
  }
  .image-item {
    position: relative;
    aspect-ratio: 4 / 3;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--soft);
    border: 1px solid var(--hairline);
  }
  .image-item img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .image-item__caption {
    position: absolute;
    bottom: 6px; left: 6px; right: 6px;
    background: rgba(0,0,0,0.65);
    color: white;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    border: none;
    width: calc(100% - 12px);
    backdrop-filter: blur(4px);
  }
  .image-item__caption::placeholder { color: rgba(255,255,255,0.55); }
  .image-item__remove {
    position: absolute;
    top: 6px; right: 6px;
    background: rgba(255,255,255,0.9);
    border: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    color: var(--ink);
    cursor: pointer;
    display: grid;
    place-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .image-item__remove:hover { background: var(--grade-repair-bg); color: var(--grade-repair-fg); }

  /* ───────────── Signature ───────────── */

  .sig-wrap {
    border: 1px dashed var(--strong-border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 6px;
    position: relative;
  }
  .sig-canvas {
    width: 100%;
    height: 180px;
    background: #FFFFFF;
    border-radius: var(--radius-sm);
    touch-action: none;
    cursor: crosshair;
    display: block;
  }
  .sig-actions {
    display: flex;
    justify-content: space-between;
    padding: 8px 6px 4px;
    align-items: center;
  }
  .sig-hint { color: var(--subtle); font-size: 12px; }

  /* ───────────── Preview / Document ─────────────
     The PDF is rendered from this DOM with html2pdf.js. The document
     uses the same A4 dimensions as the invoice tool (794×1123).
     ─────────────────────────────────────────────────────────────────── */

  .preview-panel {
    position: sticky;
    top: 70px;
    align-self: start;
    padding: 14px;
    background: linear-gradient(180deg, #F0EFEA 0%, #E7E5DF 100%);
    border-radius: var(--radius-lg);
    max-height: calc(100vh - 90px);
    overflow: auto;
  }
  .preview-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 0 4px;
    color: var(--subtle);
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .preview-stage {
    display: flex;
    justify-content: center;
  }

  .doc {
    width: 794px;
    background: white;
    box-shadow: 0 8px 32px rgba(12, 10, 9, 0.15);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    transform-origin: top center;
    overflow: hidden;
  }

  /* The visible/preview document uses the same styles as the printed doc */

  /* Page header (every PDF page) */
  .doc-page {
    padding: 36px 48px 48px;
    position: relative;
    min-height: 1123px;
    page-break-after: always;
  }
  .doc-page:last-child { page-break-after: auto; }

  /* First page hero header */
  .doc__top {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
    padding-bottom: 18px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 24px;
  }
  .doc__biz-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin: 0 0 2px;
  }
  .doc__biz-tag {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 500;
  }
  .doc__biz-rows {
    font-size: 12px;
    color: var(--ink-2);
  }
  .doc__biz-row { display: flex; gap: 6px; padding: 1px 0; }
  .doc__biz-row strong {
    color: var(--ink);
    font-weight: 700;
    min-width: 58px;
  }
  .doc__biz-logo {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: var(--navy);
    display: grid; place-items: center;
    box-shadow: 0 4px 14px rgba(30, 58, 138, 0.25);
  }
  .doc__biz-logo img { width: 88px; height: 88px; }
  .doc__biz-logo-text {
    color: white;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-align: center;
    margin-top: -8px;
  }

  .doc__title {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.015em;
    margin: 0 0 24px;
    color: var(--ink);
  }

  /* Section header bands */
  .doc-band {
    background: var(--ink);
    color: white;
    padding: 9px 14px;
    font-weight: 700;
    font-size: 13.5px;
    margin-top: 22px;
    margin-bottom: 12px;
    border-radius: 4px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .doc-band__num {
    background: rgba(255,255,255,0.2);
    color: white;
    font-weight: 800;
    width: 22px; height: 22px;
    border-radius: 4px;
    display: grid;
    place-items: center;
    font-size: 11px;
  }

  /* Report / Client details boxes */
  .doc-kv-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .doc-kv-table tr td:first-child {
    font-weight: 700;
    color: var(--ink);
    padding: 6px 10px;
    border-bottom: 1px solid var(--hairline);
    background: var(--soft);
    width: 30%;
  }
  .doc-kv-table tr td:last-child {
    padding: 6px 10px;
    border-bottom: 1px solid var(--hairline);
    color: var(--ink-2);
  }

  /* Inspection details block (free-form) */
  .doc-pairs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 24px;
    margin: 8px 0 16px;
    font-size: 13px;
  }
  .doc-pair__label {
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .doc-pair__value {
    color: var(--ink-2);
  }

  /* Criteria grid in PDF */
  .doc-crits {
    display: grid;
    grid-template-columns: 1fr 1fr;
    margin-bottom: 4px;
    font-size: 12.5px;
  }
  .doc-crit-cell {
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid white;
  }
  .doc-crit-cell__label {
    background: var(--navy-bright);
    color: white;
    font-weight: 700;
    padding: 5px 10px;
    font-size: 12px;
  }
  .doc-crit-cell__value {
    padding: 6px 10px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
  }
  .doc-crit-cell__swatch {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 2px;
  }
  .doc-crit-cell__value[data-grade='Good']   .doc-crit-cell__swatch { background: var(--grade-good-bg); }
  .doc-crit-cell__value[data-grade='Fair']   .doc-crit-cell__swatch { background: var(--grade-fair-bg); }
  .doc-crit-cell__value[data-grade='Repair'] .doc-crit-cell__swatch { background: var(--grade-repair-bg); }
  .doc-crit-cell__value[data-grade='NA']     .doc-crit-cell__swatch { background: var(--grade-na-bg); }
  .doc-crit-cell:nth-child(even) .doc-crit-cell__label { border-left: 1px solid white; }

  .doc-comments {
    margin: 10px 0 4px;
    font-size: 12.5px;
  }
  .doc-comments__label {
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .doc-comments__body {
    color: var(--ink-2);
    white-space: pre-line;
    line-height: 1.55;
  }

  /* Image appendix in PDF */
  .doc-images-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 12px;
  }
  .doc-images-grid figure {
    margin: 0;
    border-radius: 6px;
    overflow: hidden;
    background: var(--soft);
    border: 1px solid var(--hairline);
  }
  .doc-images-grid img {
    width: 100%;
    height: auto;
    display: block;
    max-height: 280px;
    object-fit: cover;
  }
  .doc-images-grid figcaption {
    padding: 6px 10px;
    font-size: 11px;
    color: var(--muted);
    background: var(--soft);
    border-top: 1px solid var(--hairline);
  }
  .doc-images__hint {
    background: var(--navy-tint);
    border-left: 3px solid var(--navy);
    padding: 10px 12px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 12px;
    color: var(--navy-deep);
    margin-bottom: 8px;
  }

  /* Rating */
  .doc-rating {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    margin-top: 8px;
  }
  .doc-rating__swatch {
    display: inline-block;
    width: 16px; height: 16px;
    border-radius: 3px;
  }
  .doc-rating__swatch[data-grade='Good']   { background: var(--grade-good-bg); }
  .doc-rating__swatch[data-grade='Fair']   { background: var(--grade-fair-bg); }
  .doc-rating__swatch[data-grade='Repair'] { background: var(--grade-repair-bg); }
  .doc-rating__swatch[data-grade='NA']     { background: var(--grade-na-bg); }

  /* Signature in PDF */
  .doc-sig {
    margin-top: 10px;
  }
  .doc-sig__statement {
    font-size: 13px;
    color: var(--ink-2);
    margin-bottom: 16px;
    padding: 12px 14px;
    background: var(--soft);
    border-left: 3px solid var(--navy);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }
  .doc-sig__row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 8px;
  }
  .doc-sig__cell-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--subtle);
    margin-bottom: 4px;
  }
  .doc-sig__cell-value {
    font-size: 14px;
    color: var(--ink);
    font-weight: 600;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--ink);
    min-height: 24px;
  }
  .doc-sig__pad {
    border-bottom: 1px solid var(--ink);
    padding: 4px 0 6px;
    min-height: 56px;
  }
  .doc-sig__pad img {
    max-height: 70px;
    max-width: 220px;
  }

  /* Terms */
  .doc-terms__heading {
    font-weight: 800;
    color: var(--ink);
    margin: 14px 0 6px;
    font-size: 14px;
  }
  .doc-terms ul {
    padding-left: 22px;
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.65;
    margin: 4px 0;
  }
  .doc-terms li { margin-bottom: 2px; }

  /* Page footer & page number */
  .doc__pageno {
    position: absolute;
    top: 22px;
    right: 32px;
    font-size: 11px;
    color: var(--subtle);
    font-weight: 600;
  }

  /* Toolbar buttons for mobile preview */
  .preview-toggle {
    display: none;
  }
  @media (max-width: 1180px) {
    .preview-toggle { display: inline-flex; }
  }

  /* Floating action bar on mobile */
  .mobile-fab {
    display: none;
  }
  @media (max-width: 700px) {
    .mobile-fab {
      display: flex;
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      gap: 8px;
      z-index: 90;
    }
    .mobile-fab .btn {
      flex: 1;
      justify-content: center;
      padding: 14px;
      font-size: 14px;
      box-shadow: var(--shadow-lg);
    }
    .app-main { padding-bottom: 80px; }
  }

  /* Toast */
  .toast-wrap {
    position: fixed; bottom: 80px; right: 16px; z-index: 1000;
    display: flex; flex-direction: column; gap: 8px;
  }
  @media (min-width: 701px) { .toast-wrap { bottom: 20px; } }
  .toast {
    padding: 12px 18px; border-radius: var(--radius);
    background: var(--ink-2); color: white; font-size: 13.5px;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.2s ease;
  }
  .toast--success { background: var(--grade-good-fg); }
  .toast--error { background: var(--grade-repair-fg); }
  @keyframes toastIn {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Drafts panel */
  .drafts {
    position: fixed;
    top: 64px;
    right: 16px;
    width: 320px;
    max-width: calc(100vw - 32px);
    max-height: 60vh;
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    z-index: 200;
    padding: 12px;
    display: none;
  }
  .drafts[data-open='true'] { display: block; }
  .draft-item {
    padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .draft-item:hover { background: var(--soft); }
  .draft-item__name { font-weight: 600; font-size: 13.5px; }
  .draft-item__when { font-size: 11.5px; color: var(--subtle); }
  .draft-item__delete {
    background: transparent; border: 0; color: var(--subtle); cursor: pointer;
    padding: 4px; border-radius: 4px;
  }
  .draft-item__delete:hover { color: var(--grade-repair-fg); background: var(--grade-repair-bg); }
  .drafts-empty {
    padding: 30px 12px; text-align: center; color: var(--subtle); font-size: 13px;
  }

  /* Auto-scroll within long forms */
  .sec[data-completed='true'] .sec__head { background: var(--grade-good-bg); }
  .sec[data-completed='true'] .sec__num { background: var(--grade-good-fg); color: white; }

  @media print {
    body { background: white; }
    .app-header, .form-panel, .preview-toolbar, .actions, .mobile-fab { display: none !important; }
    .app-main { padding: 0; grid-template-columns: 1fr; }
    .preview-panel { padding: 0; background: white; position: static; max-height: none; overflow: visible; }
    .doc { box-shadow: none; transform: none !important; width: 100%; }
  }
</style>
</head>

/* ────────────────────────────────────────────────────────────────────
   Auto-numbering for reports — RPT_YYYYMMDD_NNNN
   ─────────────────────────────────────────────────────────────────── */
function autoReportNumber() {
  const d = new Date();
  const ymd = d.getFullYear()
    + String(d.getMonth() + 1).padStart(2, '0')
    + String(d.getDate()).padStart(2, '0');
  const next = (parseInt(localStorage.getItem('mmqld_report_counter') || '65', 10) + 1);
  return `RPT_${ymd}_${String(next).padStart(4, '0')}`;
}
function bumpReportCounter() {
  const next = (parseInt(localStorage.getItem('mmqld_report_counter') || '65', 10) + 1);
  localStorage.setItem('mmqld_report_counter', String(next));
}

const today = () => new Date().toISOString().slice(0, 10);
const fmtDate = (s) => {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  if (isNaN(d.getTime())) return s;
  return d.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' });
};
const fmtDateTimeRange = (date, start, end) => {
  if (!date) return '';
  const d = new Date(date + 'T00:00:00');
  const day = d.toLocaleDateString('en-AU', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
  if (!start) return day;
  return `${day} ${start}${end ? ' - ' + end : ''}`;
};

/* ────────────────────────────────────────────────────────────────────
   Section open/close
   ─────────────────────────────────────────────────────────────────── */

function wireSectionToggles() {
  document.querySelectorAll('.sec__head').forEach(head => {
    head.addEventListener('click', () => {
      const id = head.dataset.section;
      const body = document.querySelector(`[data-section-body="${id}"]`);
      const isOpen = head.dataset.open === 'true';
      // Close all
      document.querySelectorAll('.sec__head').forEach(h => h.dataset.open = 'false');
      document.querySelectorAll('.sec__body').forEach(b => b.dataset.open = 'false');
      // Open this one
      if (!isOpen) {
        head.dataset.open = 'true';
        body.dataset.open = 'true';
        // Smooth scroll on mobile
        setTimeout(() => head.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
      }
    });
  });
}

function sectionComplete(id) {
  const sst = state.sections[id];
  if (!sst) return false;
  // "complete" = has any non-default activity (comments or non-Fair grade or no Fair-only)
  return sst.comments.trim().length > 0 || sst.grades.some(g => g !== 'Fair');
}

/* ────────────────────────────────────────────────────────────────────
   Event wiring (delegated)
   ─────────────────────────────────────────────────────────────────── */

document.addEventListener('input', (e) => {
  const t = e.target;
  if (t.dataset.bind) {
    setByPath(state, t.dataset.bind, t.value);
    schedulePreview();
    return;
  }
  if (t.dataset.imgCaption) {
    const img = state.images.find(x => x.id === t.dataset.imgCaption);
    if (img) { img.caption = t.value; schedulePreview(); }
    return;
  }
});

document.addEventListener('change', (e) => {
  const t = e.target;
  // Terms textareas (multi-line) need split on save
  if (t.dataset.bind === 'terms.disclaimer') {
    state.terms.disclaimer = t.value.split('\n').map(s => s.trim()).filter(Boolean);
    schedulePreview();
  }
  if (t.dataset.bind === 'terms.notChecked') {
    state.terms.notChecked = t.value.split('\n').map(s => s.trim()).filter(Boolean);
    schedulePreview();
  }
});

document.addEventListener('click', (e) => {
  // Criterion grade pill
  const pill = e.target.closest('.crit__pill[data-grade][data-section]');
  if (pill) {
    const { section, idx, grade } = pill.dataset;
    state.sections[section].grades[Number(idx)] = grade;
    document.querySelectorAll(`.crit__pill[data-section="${section}"][data-idx="${idx}"]`).forEach(p => {
      p.dataset.active = (p.dataset.grade === grade) ? 'true' : 'false';
    });
    // Update completion state on the section card
    const secEl = pill.closest('.sec');
    if (secEl) secEl.dataset.completed = sectionComplete(section);
    schedulePreview();
    return;
  }

  // Bulk set
  const bulk = e.target.closest('.sec__bulk-btn[data-bulk]');
  if (bulk) {
    const { bulk: sec, grade } = bulk.dataset;
    state.sections[sec].grades = state.sections[sec].grades.map(() => grade);
    // Re-render that section only to refresh pills
    const body = document.querySelector(`[data-section-body="${sec}"]`);
    const crit = body.querySelector('.criteria');
    const secDef = SECTIONS.find(s => s.id === sec);
    crit.innerHTML = secDef.criteria.map((label, idx) =>
      renderCriterion(sec, idx, label, state.sections[sec].grades[idx])).join('');
    body.closest('.sec').dataset.completed = sectionComplete(sec);
    schedulePreview();
    return;
  }

  // Overall rating
  const ov = e.target.closest('[data-overall]');
  if (ov) {
    state.overall = ov.dataset.overall;
    document.querySelectorAll('[data-overall]').forEach(p => {
      p.dataset.active = (p.dataset.overall === state.overall) ? 'true' : 'false';
    });
    schedulePreview();
    return;
  }

  // Image remove
  const imgRm = e.target.closest('[data-img-remove]');
  if (imgRm) {
    state.images = state.images.filter(x => x.id !== imgRm.dataset.imgRemove);
    rerenderImagesSection();
    schedulePreview();
    return;
  }

  // Terms reset
  if (e.target.id === 'termsResetBtn') {
    state.terms = JSON.parse(JSON.stringify(DEFAULT_TERMS));
    rerenderTermsSection();
    schedulePreview();
    toast('Terms reset.');
    return;
  }
});

function setByPath(obj, path, value) {
  const keys = path.split('.');
  let o = obj;
  for (let i = 0; i < keys.length - 1; i++) o = o[keys[i]];
  o[keys[keys.length - 1]] = value;
}

function rerenderImagesSection() {
  // Update header count + grid only
  const head = document.querySelector('[data-section="images"]');
  if (head) head.querySelector('.sec__title').textContent = `Images (${state.images.length})`;
  const grid = document.getElementById('imageGrid');
  if (grid) grid.innerHTML = state.images.map(renderImageItem).join('');
}

function rerenderTermsSection() {
  const body = document.querySelector('[data-section-body="terms"]');
  if (!body) return;
  body.querySelector('[data-bind="terms.disclaimer"]').value = state.terms.disclaimer.join('\n');
  body.querySelector('[data-bind="terms.notChecked"]').value = state.terms.notChecked.join('\n');
}

/* ────────────────────────────────────────────────────────────────────
   Image upload + compression
   ─────────────────────────────────────────────────────────────────── */

document.addEventListener('change', async (e) => {
  if (e.target.id !== 'imgInput') return;
  const files = Array.from(e.target.files || []);
  if (!files.length) return;
  toast(`Processing ${files.length} image${files.length > 1 ? 's' : ''}…`);
  for (const f of files) {
    try {
      const dataUrl = await compressImage(f, 1400, 0.82);
      state.images.push({ id: crypto.randomUUID(), dataUrl, caption: '' });
    } catch (err) {
      console.error(err);
      toast('Failed to load ' + f.name, 'error');
    }
  }
  e.target.value = '';
  rerenderImagesSection();
  schedulePreview();
});

function compressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        const ratio = Math.min(1, maxDim / Math.max(width, height));
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ────────────────────────────────────────────────────────────────────
   Signature pad
   ─────────────────────────────────────────────────────────────────── */

let sigCtx = null;
let sigDrawing = false;
let sigLastPt = null;

function wireSignaturePad() {
  const canvas = document.getElementById('sigCanvas');
  if (!canvas) return;
  resizeSigCanvas(canvas);
  sigCtx = canvas.getContext('2d');
  sigCtx.lineWidth = 2.2;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';
  sigCtx.strokeStyle = '#0C0A09';

  // Restore from state if saved
  if (state.signature.dataUrl) {
    const img = new Image();
    img.onload = () => {
      sigCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
    };
    img.src = state.signature.dataUrl;
  }

  const start = (x, y) => { sigDrawing = true; sigLastPt = [x, y]; };
  const move = (x, y) => {
    if (!sigDrawing) return;
    sigCtx.beginPath();
    sigCtx.moveTo(sigLastPt[0], sigLastPt[1]);
    sigCtx.lineTo(x, y);
    sigCtx.stroke();
    sigLastPt = [x, y];
  };
  const end = () => {
    if (!sigDrawing) return;
    sigDrawing = false;
    sigLastPt = null;
    state.signature.dataUrl = canvas.toDataURL('image/png');
    schedulePreview();
  };

  const ptFromEvt = (e) => {
    const r = canvas.getBoundingClientRect();
    const e0 = e.touches ? e.touches[0] : e;
    return [e0.clientX - r.left, e0.clientY - r.top];
  };

  canvas.addEventListener('mousedown', e => { const [x,y] = ptFromEvt(e); start(x,y); });
  canvas.addEventListener('mousemove', e => { const [x,y] = ptFromEvt(e); move(x,y); });
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);

  canvas.addEventListener('touchstart', e => { e.preventDefault(); const [x,y] = ptFromEvt(e); start(x,y); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); const [x,y] = ptFromEvt(e); move(x,y); }, { passive: false });
  canvas.addEventListener('touchend', end);

  document.getElementById('sigClearBtn').addEventListener('click', () => {
    sigCtx.clearRect(0, 0, canvas.width, canvas.height);
    state.signature.dataUrl = '';
    schedulePreview();
  });

  // Re-size on viewport change
  const ro = new ResizeObserver(() => resizeSigCanvas(canvas));
  ro.observe(canvas.parentElement);
}

function resizeSigCanvas(canvas) {
  const r = canvas.getBoundingClientRect();
  const ratio = window.devicePixelRatio || 1;
  if (canvas.width !== Math.round(r.width * ratio) || canvas.height !== Math.round(r.height * ratio)) {
    // Preserve existing drawing
    const old = canvas.toDataURL();
    canvas.width = Math.round(r.width * ratio);
    canvas.height = Math.round(r.height * ratio);
    const ctx = canvas.getContext('2d');
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#0C0A09';
    if (old && old !== 'data:,') {
      const im = new Image();
      im.onload = () => ctx.drawImage(im, 0, 0, r.width, r.height);
      im.src = old;
    }
  }
}

/* ────────────────────────────────────────────────────────────────────
   PREVIEW RENDERING — the printable document
   ─────────────────────────────────────────────────────────────────── */

let _previewTimer = null;
function schedulePreview() {
  clearTimeout(_previewTimer);
  _previewTimer = setTimeout(renderPreview, 60);
}

function renderPreview() {
  const doc = document.getElementById('reportDoc');
  doc.innerHTML = buildDocHTML();
  autoFitZoom();
}

function buildDocHTML() {
  return `
    <div class="doc-page">
      ${pageHeader(1)}
      ${biz()}
      <h1 class="doc__title">Vehicle Inspection Report</h1>
      ${reportDetailsTable()}
      ${clientDetailsTable()}
      ${inspectionDetailsBlock()}
    </div>
    ${SECTIONS.map((sec, i) => `
      <div class="doc-page">
        ${pageHeader(i + 2)}
        ${sectionBand(sec)}
        ${criteriaGrid(sec)}
        ${commentsBlock(sec)}
      </div>
    `).join('')}
    ${ratingPage()}
    ${imagesPages()}
    ${signaturePage()}
    ${termsPage()}
  `;
}

function pageHeader(n) {
  // Page numbers handled by html2pdf via internal pagination — but we keep a hint label visible
  return `<div class="doc__pageno">Section ${n}</div>`;
}

function biz() {
  return `
    <div class="doc__top">
      <div>
        <h1 class="doc__biz-name">${BUSINESS.name}</h1>

          <div class="doc__biz-row"><strong>Email</strong><span>${BUSINESS.email}</span></div>
          <div class="doc__biz-row"><strong>Website</strong><span>${BUSINESS.website}</span></div>
          <div class="doc__biz-row"><strong>ABN</strong><span>${BUSINESS.abn}</span></div>

}

function reportDetailsTable() {
  return `
    <div class="doc-band"><span class="doc-band__num">i</span>Report details</div>

}

function clientDetailsTable() {

    <div class="doc-band"><span class="doc-band__num">i</span>Client details</div>
    <table class="doc-kv-table">

      <tr><td>Address</td><td>${escHtml(state.client.address) || '—'}</td></tr>
      <tr><td>Contact Phone</td><td>${escHtml(state.client.phone) || '—'}</td></tr>

function inspectionDetailsBlock() {
  return `
    <div class="doc-band"><span class="doc-band__num">1</span>Inspection details</div>

        <div class="doc-pair__label">Inspection Location</div>

      </div>

        <div class="doc-pair__label">Inspection Date</div>

function sectionBand(sec) {
  return `<div class="doc-band"><span class="doc-band__num">${sec.num}</span>${sec.title}</div>`;
}

function criteriaGrid(sec) {
  const sst = state.sections[sec.id];
  const cells = sec.criteria.map((label, idx) => {
    const g = sst.grades[idx];
    return `
      <div class="doc-crit-cell">
        <div class="doc-crit-cell__label">${escHtml(label)}</div>
        <div class="doc-crit-cell__value" data-grade="${g}">
          <span class="doc-crit-cell__swatch"></span>${g}
        </div>
      </div>
    `;
  });
  // Pad with empty cell if odd count
  if (cells.length % 2 === 1) {
    cells.push('<div class="doc-crit-cell"><div class="doc-crit-cell__label" style="background:transparent;visibility:hidden">&nbsp;</div><div class="doc-crit-cell__value">&nbsp;</div></div>');
  }
  return `<div class="doc-crits">${cells.join('')}</div>`;
}

function commentsBlock(sec) {
  const sst = state.sections[sec.id];
  if (!sst.comments.trim()) return '';
  return `
    <div class="doc-comments">
      <div class="doc-comments__label">Comments</div>
      <div class="doc-comments__body">${escHtml(sst.comments)}</div>
    </div>
  `;
}

function ratingPage() {
  return `
    <div class="doc-page">
      <div class="doc__pageno">Section ${SECTIONS.length + 2}</div>
      <div class="doc-band"><span class="doc-band__num">7</span>Rating and general comments</div>
      <div style="margin-bottom: 4px;">
        <div class="doc-comments__label" style="font-size: 12.5px;">Overall rating</div>
        <div class="doc-rating">
          <span class="doc-rating__swatch" data-grade="${state.overall}"></span>
          <span>${state.overall}</span>
        </div>
      </div>
      ${state.overallComments.trim() ? `
        <div class="doc-comments" style="margin-top: 14px;">
          <div class="doc-comments__label">General comments</div>
          <div class="doc-comments__body">${escHtml(state.overallComments)}</div>
        </div>
      ` : ''}
    </div>
  `;
}

function imagesPages() {
  if (state.images.length === 0) return '';

  // 6 images per page (3 rows × 2 cols)
  const perPage = 6;
  const pages = [];
  for (let i = 0; i < state.images.length; i += perPage) {
    pages.push(state.images.slice(i, i + perPage));
  }

  return pages.map((batch, pi) => `
    <div class="doc-page">
      <div class="doc__pageno">Images · ${pi + 1} of ${pages.length}</div>
      ${pi === 0 ? `
        <div class="doc-band"><span class="doc-band__num">📷</span>Inspection images</div>
        <div class="doc-images__hint">
          Images captured during the inspection. Two per row, in the order they were uploaded.
        </div>
      ` : ''}
      <div class="doc-images-grid">
        ${batch.map(img => `
          <figure>
            <img src="${img.dataUrl}" alt="" />
            ${img.caption.trim() ? `<figcaption>${escHtml(img.caption)}</figcaption>` : ''}
          </figure>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function signaturePage() {
  return `
    <div class="doc-page">
      <div class="doc__pageno">Sign-off</div>
      <div class="doc-band"><span class="doc-band__num">8</span>Sign-off</div>

          </div>
        </div>

          <div class="doc-sig__cell-label">Signature</div>
          <div class="doc-sig__pad">
            ${state.signature.dataUrl

              : '<span style="color: var(--subtle); font-size: 12px;">— not signed —</span>'}
          </div>

function termsPage() {
  return `
    <div class="doc-page">
      <div class="doc__pageno">Terms</div>
      <div class="doc-band"><span class="doc-band__num">9</span>Terms and Conditions</div>
      <div class="doc-terms">
        <div class="doc-terms__heading">DISCLAIMER</div>
        <ul>
          ${state.terms.disclaimer.map(t => `<li>${escHtml(t)}</li>`).join('')}
        </ul>
        <div class="doc-terms__heading">${BUSINESS.name} does not check the following items</div>
        <ul>
          ${state.terms.notChecked.map(t => `<li>${escHtml(t)}</li>`).join('')}
        </ul>
      </div>
    </div>
  `;

/* ────────────────────────────────────────────────────────────────────
   PDF export
   ─────────────────────────────────────────────────────────────────── */

async function exportPdf() {
  if (typeof html2pdf === 'undefined') {
    toast('PDF library still loading, try again in a second.', 'error');
    return;
  }
  toast('Generating PDF — this may take a few seconds…');
  const node = document.getElementById('reportDoc').cloneNode(true);
  node.style.transform = 'none';
  node.style.boxShadow = 'none';
  const wrapper = document.createElement('div');
  wrapper.style.background = 'white';
  wrapper.appendChild(node);

  const filename = (state.reportNumber || 'inspection-report') + '.pdf';

  try {
    await html2pdf().set({
      margin: 0,
      filename,
      image: { type: 'jpeg', quality: 0.92 },
      html2canvas: { scale: 2, useCORS: true, backgroundColor: '#FFFFFF', logging: false },
      jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait', hotfixes: ['px_scaling'] },
      pagebreak: { mode: ['css', 'legacy'] },
    }).from(wrapper).save();
    bumpReportCounter();
    toast('PDF downloaded.', 'success');
  } catch (err) {
    console.error(err);
    toast('PDF export failed: ' + err.message, 'error');
  }
}

/* ────────────────────────────────────────────────────────────────────
   Drafts (localStorage) — careful with image size; we cap drafts to 5
   to avoid hitting the ~5MB localStorage quota.
   ─────────────────────────────────────────────────────────────────── */

const DRAFTS_KEY = 'mmqld_inspection_drafts_v1';

function loadDrafts() {
  try { return JSON.parse(localStorage.getItem(DRAFTS_KEY) || '[]'); }
  catch { return []; }
}

function saveDraft() {
  try {
    const drafts = loadDrafts();
    const id = state.reportNumber || crypto.randomUUID();
    const draft = {
      id,
      name: state.inspection.makeModel || state.client.contact || 'Untitled',
      number: state.reportNumber,
      savedAt: Date.now(),
      state: JSON.parse(JSON.stringify(state)),
    };
    const idx = drafts.findIndex(d => d.id === id);
    if (idx >= 0) drafts[idx] = draft;
    else drafts.unshift(draft);
    const trimmed = drafts.slice(0, 5);
    localStorage.setItem(DRAFTS_KEY, JSON.stringify(trimmed));
    toast('Draft saved.', 'success');
  } catch (err) {
    toast('Could not save (too many images). Export PDF instead.', 'error');
  }
}

function renderDraftsList() {
  const drafts = loadDrafts();
  const list = document.getElementById('draftsList');
  if (drafts.length === 0) {
    list.innerHTML = '<div class="drafts-empty">No saved drafts yet.</div>';
    return;
  }
  list.innerHTML = drafts.map(d => `
    <div class="draft-item" data-id="${d.id}">
      <div>
        <div class="draft-item__name">${escHtml(d.name)}</div>
        <div class="draft-item__when">${escHtml(d.number)} · ${new Date(d.savedAt).toLocaleString('en-AU')}</div>
      </div>
      <button class="draft-item__delete" data-delete="${d.id}" title="Delete">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button>
    </div>
  `).join('');

  list.querySelectorAll('.draft-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('[data-delete]')) return;
      const drafts = loadDrafts();
      const d = drafts.find(x => x.id === el.dataset.id);
      if (!d) return;
      state = d.state;
      renderForm();
      renderPreview();
      document.getElementById('draftsPanel').dataset.open = 'false';
      toast('Draft loaded.');
    });
  });

  list.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const drafts = loadDrafts().filter(d => d.id !== btn.dataset.delete);
      localStorage.setItem(DRAFTS_KEY, JSON.stringify(drafts));
      renderDraftsList();
    });
  });
}

/* ────────────────────────────────────────────────────────────────────
   Toolbar wiring (post-render so handlers attach correctly)
   ─────────────────────────────────────────────────────────────────── */

function bindToolbar() {
  document.getElementById('newBtn').addEventListener('click', () => {
    if (!confirm('Start a new report? Unsaved changes will be lost.')) return;
    state = newState();
    renderForm();
    renderPreview();
    toast('New report started.');
  });

  document.getElementById('saveBtn').addEventListener('click', saveDraft);
  document.getElementById('saveBtnMobile').addEventListener('click', saveDraft);
  document.getElementById('pdfBtn').addEventListener('click', exportPdf);
  document.getElementById('pdfBtnMobile').addEventListener('click', exportPdf);

  document.getElementById('loadBtn').addEventListener('click', () => {
    const panel = document.getElementById('draftsPanel');
    const isOpen = panel.dataset.open === 'true';
    if (isOpen) {
      panel.dataset.open = 'false';
    } else {
      renderDraftsList();
      panel.dataset.open = 'true';
    }
  });

  // Click-outside closes drafts
  document.addEventListener('click', (e) => {
    if (e.target.closest('#loadBtn') || e.target.closest('#draftsPanel')) return;
    document.getElementById('draftsPanel').dataset.open = 'false';
  });

  // Mobile preview toggle
  const previewPanel = document.getElementById('previewPanel');
  document.getElementById('previewToggleBtn').addEventListener('click', () => {
    const showing = previewPanel.dataset.show === 'true';
    previewPanel.dataset.show = showing ? 'false' : 'true';
    document.getElementById('closePreviewBtn').style.display = showing ? 'none' : 'inline-flex';
  });
  document.getElementById('closePreviewBtn').addEventListener('click', () => {
    previewPanel.dataset.show = 'false';
    document.getElementById('closePreviewBtn').style.display = 'none';
  });
}

/* ────────────────────────────────────────────────────────────────────
   Zoom — fit doc to preview column
   ─────────────────────────────────────────────────────────────────── */

function autoFitZoom() {
  const stage = document.querySelector('.preview-stage');
  const doc = document.getElementById('reportDoc');
  if (!stage || !doc) return;
  const available = stage.clientWidth - 8;
  if (available < 794) {
    const z = Math.max(0.32, Math.min(1, available / 794));
    doc.style.transform = `scale(${z})`;
    doc.style.width = '794px';
    stage.style.height = '';
  } else {
    doc.style.transform = 'scale(1)';
  }
}
window.addEventListener('resize', autoFitZoom);

/* ────────────────────────────────────────────────────────────────────
   Toasts
   ─────────────────────────────────────────────────────────────────── */
function toast(msg, kind) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' toast--' + kind : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

/* ────────────────────────────────────────────────────────────────────
   Init
   ─────────────────────────────────────────────────────────────────── */

renderForm();
renderPreview();
bindToolbar();
autoFitZoom();
</script>
