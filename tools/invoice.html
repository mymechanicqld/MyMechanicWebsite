<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1E3A8A" />
<title>Invoice Generator · My Mechanic QLD</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>

<style>
  /* ───────────────────────────────────────────────────────────────────
     My Mechanic QLD — Invoice Generator
     Single-file tool. Generates a branded A4 tax invoice as a PDF.
     Open this file in any browser. All data lives in your browser
     (localStorage); nothing leaves the device.
     ─────────────────────────────────────────────────────────────────── */

  :root {
    /* Brand palette — matches the live site */
    --navy: #1E3A8A;
    --navy-hover: #1E40AF;
    --navy-bright: #2563EB;
    --navy-tint: #E8EEFB;
    --navy-deep: #1A2E6E;

    --bg: #FAFAF8;
    --soft: #F5F4EF;
    --surface: #FFFFFF;
    --ink: #0C0A09;
    --ink-2: #1C1917;
    --muted: #44403C;
    --subtle: #78716C;
    --hairline: #E7E5E0;
    --strong-border: #D6D3CB;

    --success: #047857;
    --success-bg: #ECFDF5;
    --warning: #B45309;
    --warning-bg: #FEF3C7;
    --danger: #B91C1C;
    --danger-bg: #FEE2E2;

    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;

    --shadow-sm: 0 1px 2px rgba(12, 10, 9, 0.04);
    --shadow: 0 1px 3px rgba(12, 10, 9, 0.06), 0 4px 14px rgba(12, 10, 9, 0.05);
    --shadow-lg: 0 8px 28px rgba(12, 10, 9, 0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-feature-settings: 'cv11', 'ss01';
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    font-size: 14px;
  }

  button, input, textarea, select { font: inherit; color: inherit; }
  a { color: var(--navy); }

  /* ───────────── App chrome ───────────── */

  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--hairline);
    backdrop-filter: saturate(180%) blur(8px);
  }
  .app-header__inner {
    max-width: 1480px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    letter-spacing: -0.01em;
    font-size: 16px;
    color: var(--ink);
    text-decoration: none;
  }
  .brand__mark {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--navy);
    display: grid;
    place-items: center;
    box-shadow: var(--shadow-sm);
  }
  .brand__mark img { width: 26px; height: 26px; }
  .brand__sub {
    font-weight: 500;
    color: var(--subtle);
    font-size: 12px;
    letter-spacing: 0;
    margin-left: 2px;
    display: inline-block;
  }
  .brand__sub::before {
    content: '·';
    margin: 0 6px;
    color: var(--strong-border);
  }

  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--strong-border);
    background: var(--surface);
    color: var(--ink);
    padding: 9px 14px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 13.5px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    box-shadow: var(--shadow-sm);
  }
  .btn:hover { background: var(--soft); border-color: var(--navy); }
  .btn:active { transform: translateY(1px); }
  .btn--primary {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }
  .btn--primary:hover { background: var(--navy-hover); border-color: var(--navy-hover); }
  .btn--ghost { background: transparent; border-color: transparent; box-shadow: none; }
  .btn--ghost:hover { background: var(--soft); border-color: var(--hairline); }
  .btn--danger {
    color: var(--danger);
    border-color: var(--danger-bg);
    background: var(--danger-bg);
  }
  .btn--icon { padding: 8px; line-height: 0; }

  /* ───────────── Layout ───────────── */

  .app-main {
    max-width: 1480px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr);
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 1024px) {
    .app-main { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }

  /* ───────────── Form panel ───────────── */

  .form-panel { padding: 0; }
  .form-section { padding: 22px 24px; border-bottom: 1px solid var(--hairline); }
  .form-section:last-child { border-bottom: 0; }
  .form-section__head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }
  .form-section__title {
    margin: 0;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--subtle);
  }
  .form-section__hint {
    font-size: 12px;
    color: var(--subtle);
  }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: -0.005em;
  }
  .field input, .field textarea, .field select {
    appearance: none;
    border: 1px solid var(--strong-border);
    background: var(--surface);
    color: var(--ink);
    padding: 10px 12px;
    border-radius: var(--radius);
    font-size: 14px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    width: 100%;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--navy);
    box-shadow: 0 0 0 3px var(--navy-tint);
  }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .field select {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath fill='%2378716C' d='M1 1l5 5 5-5'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 36px;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
  @media (max-width: 600px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  }

  /* Line items / receipts table */
  .items-head, .items-row, .receipts-row {
    display: grid;
    grid-template-columns: 1fr 90px 110px 110px 32px;
    gap: 8px;
    align-items: center;
  }
  .receipts-head, .receipts-row {
    grid-template-columns: 130px 1fr 130px 32px;
  }
  .items-head, .receipts-head {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--subtle);
    padding: 0 4px 6px;
    border-bottom: 1px solid var(--hairline);
    margin-bottom: 8px;
  }
  .items-row, .receipts-row { margin-bottom: 8px; }
  .items-row input, .receipts-row input {
    padding: 8px 10px;
    font-size: 13.5px;
  }
  .items-row .item-amount {
    color: var(--ink);
    font-weight: 600;
    text-align: right;
    background: var(--soft);
    border-color: var(--hairline);
  }
  .row-remove {
    border: none;
    background: transparent;
    color: var(--subtle);
    cursor: pointer;
    padding: 6px;
    border-radius: var(--radius-sm);
    display: grid;
    place-items: center;
  }
  .row-remove:hover { color: var(--danger); background: var(--danger-bg); }
  .add-row {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--navy-tint);
    color: var(--navy);
    border: 1px dashed var(--navy);
    padding: 8px 14px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    margin-top: 6px;
  }
  .add-row:hover { background: var(--navy); color: white; }

  @media (max-width: 700px) {
    .items-head { display: none; }
    .items-row {
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 12px;
      background: var(--soft);
      border-radius: var(--radius);
      margin-bottom: 12px;
    }
    .items-row > * { width: 100%; }
    .items-row::before {
      content: 'Item';
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
    }
    .row-remove {
      justify-self: end;
      margin-top: -32px;
    }
    .receipts-head { display: none; }
    .receipts-row {
      grid-template-columns: 1fr;
      padding: 12px;
      background: var(--soft);
      border-radius: var(--radius);
    }
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 0;
  }
  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    background: var(--strong-border);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s ease;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 20px;
    height: 20px;
    border-radius: 999px;
    background: white;
    box-shadow: var(--shadow-sm);
    transition: transform 0.15s ease;
  }
  .toggle[data-on='true'] { background: var(--navy); }
  .toggle[data-on='true']::after { transform: translateX(20px); }

  /* Status pills selector */
  .status-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .pill {
    padding: 7px 14px;
    border-radius: 999px;
    background: var(--soft);
    border: 1px solid var(--strong-border);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.12s ease;
    color: var(--muted);
  }
  .pill[data-active='true'] {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }
  .pill[data-status='paid'][data-active='true'] { background: var(--success); border-color: var(--success); }
  .pill[data-status='partial'][data-active='true'] { background: var(--warning); border-color: var(--warning); }
  .pill[data-status='outstanding'][data-active='true'] { background: var(--danger); border-color: var(--danger); }

  /* ───────────── Preview panel ───────────── */

  .preview-panel {
    position: sticky;
    top: 76px;
    align-self: start;
    padding: 16px;
    background: linear-gradient(180deg, #F0EFEA 0%, #E7E5DF 100%);
  }
  @media (max-width: 1024px) {
    .preview-panel { position: static; }
  }

  .preview-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 4px;
    color: var(--subtle);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .zoom-controls { display: flex; gap: 4px; }
  .zoom-btn {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    color: var(--muted);
    font-weight: 700;
  }
  .zoom-btn:hover { background: var(--soft); }

  .preview-stage {
    background: transparent;
    display: flex;
    justify-content: center;
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 12px;
  }
  .preview-stage::-webkit-scrollbar { height: 8px; }
  .preview-stage::-webkit-scrollbar-track { background: transparent; }
  .preview-stage::-webkit-scrollbar-thumb { background: var(--strong-border); border-radius: 8px; }

  /* ───────────── Document (the invoice itself) ─────────────
     A4 size: 210 × 297 mm. We render at 794 × 1123 px (96 DPI).
     ─────────────────────────────────────────────────────────── */

  .doc {
    width: 794px;
    min-height: 1123px;
    background: white;
    box-shadow: 0 8px 32px rgba(12, 10, 9, 0.15);
    color: var(--ink);
    position: relative;
    overflow: hidden;
    font-family: 'Inter', -apple-system, sans-serif;
    transform-origin: top center;
  }

  /* Header band with curved divider */
  .doc__header {
    position: relative;
    background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 65%, var(--navy-bright) 130%);
    color: white;
    padding: 38px 54px 80px;
    overflow: hidden;
  }
  .doc__header-pattern {
    position: absolute;
    top: -50%;
    right: -10%;
    width: 400px;
    height: 400px;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,0.06) 0, transparent 50%);
    pointer-events: none;
  }
  .doc__header-dots {
    position: absolute;
    left: 30px;
    bottom: 70px;
    width: 60px;
    height: 40px;
    opacity: 0.25;
  }
  .doc__header-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    position: relative;
    z-index: 2;
  }
  .doc__brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .doc__brand-mark {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.14);
    border: 1px solid rgba(255, 255, 255, 0.22);
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .doc__brand-mark img { width: 42px; height: 42px; }
  .doc__brand-text {
    line-height: 1.15;
  }
  .doc__brand-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .doc__brand-tagline {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.7);
    margin-top: 6px;
  }
  .doc__contact {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 12.5px;
    text-align: right;
  }
  .doc__contact-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
    color: rgba(255, 255, 255, 0.95);
  }
  .doc__contact-row svg { flex-shrink: 0; opacity: 0.7; }
  .doc__contact-row strong {
    color: rgba(255, 255, 255, 0.55);
    font-weight: 600;
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  /* Curved bottom divider — SVG mask */
  .doc__header-wave {
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 50px;
  }

  /* Body */
  .doc__body {
    padding: 36px 54px 40px;
    position: relative;
  }
  .doc__watermark {
    position: absolute;
    top: 240px;
    left: 50%;
    transform: translateX(-50%);
    width: 360px;
    height: 360px;
    opacity: 0.04;
    pointer-events: none;
    z-index: 1;
  }

  /* Meta block (customer + invoice info) */
  .doc__meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    margin-bottom: 36px;
    position: relative;
    z-index: 2;
  }
  .doc__customer-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--subtle);
    margin-bottom: 8px;
  }
  .doc__customer-name {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--ink);
  }
  .doc__customer-addr {
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--muted);
    white-space: pre-line;
  }

  .doc__invoice-meta {
    text-align: right;
  }
  .doc__invoice-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.01em;
    margin: 0 0 10px;
    color: var(--ink);
  }
  .doc__invoice-row {
    font-size: 13.5px;
    margin-bottom: 4px;
    color: var(--muted);
  }
  .doc__invoice-row strong {
    color: var(--ink);
    font-weight: 700;
    margin-right: 6px;
  }
  .doc__status {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .doc__status--paid { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
  .doc__status--partial { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning); }
  .doc__status--outstanding { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); }

  /* Items table */
  .doc__table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 24px;
    position: relative;
    z-index: 2;
  }
  .doc__table th {
    text-align: left;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--subtle);
    padding: 12px 8px;
    border-bottom: 1.5px solid var(--ink);
  }
  .doc__table th:nth-child(2) { text-align: right; width: 80px; }
  .doc__table th:nth-child(3) { text-align: right; width: 110px; }
  .doc__table th:nth-child(4) { text-align: right; width: 110px; }
  .doc__table td {
    padding: 14px 8px;
    border-bottom: 1px solid var(--hairline);
    font-size: 13.5px;
    color: var(--ink-2);
    vertical-align: top;
  }
  .doc__table td:nth-child(2),
  .doc__table td:nth-child(3),
  .doc__table td:nth-child(4) { text-align: right; font-variant-numeric: tabular-nums; }
  .doc__table .desc { color: var(--ink); }
  .doc__table .desc small { display: block; color: var(--subtle); font-size: 12px; margin-top: 2px; }

  /* Totals */
  .doc__totals {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 40px;
    margin-bottom: 28px;
    position: relative;
    z-index: 2;
  }
  .doc__notes {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.6;
    padding: 14px 16px;
    background: var(--soft);
    border-left: 3px solid var(--navy);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    white-space: pre-line;
  }
  .doc__notes-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .doc__totals-stack {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .doc__totals-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 24px;
    font-size: 13.5px;
    padding: 5px 0;
    color: var(--muted);
  }
  .doc__totals-row strong { color: var(--ink); font-weight: 700; }
  .doc__totals-row--total {
    border-top: 1.5px solid var(--ink);
    margin-top: 6px;
    padding-top: 10px;
    font-size: 16px;
  }
  .doc__totals-row--total strong { font-weight: 800; }
  .doc__totals-row--outstanding {
    color: var(--danger);
  }
  .doc__totals-row--outstanding strong { color: var(--danger); }
  .doc__totals-row--paid {
    color: var(--success);
  }

  /* Receipts */
  .doc__receipts {
    margin-top: 8px;
    position: relative;
    z-index: 2;
  }
  .doc__receipts-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--subtle);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--hairline);
  }
  .doc__receipts-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .doc__receipts-table th {
    text-align: left;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--subtle);
    padding: 6px 4px;
  }
  .doc__receipts-table th:last-child { text-align: right; }
  .doc__receipts-table td {
    padding: 8px 4px;
    color: var(--ink-2);
    font-variant-numeric: tabular-nums;
  }
  .doc__receipts-table td:last-child { text-align: right; font-weight: 600; }

  /* Footer */
  .doc__footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--navy-deep);
    color: white;
    text-align: center;
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .doc__footer a {
    color: white;
    text-decoration: none;
  }
  .doc__footer-strip {
    height: 6px;
    background: linear-gradient(90deg, var(--navy-bright), var(--navy), var(--navy-bright));
  }

  /* Empty state */
  .doc__empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--subtle);
    font-size: 14px;
    border: 1px dashed var(--strong-border);
    border-radius: var(--radius);
    margin: 12px 0;
  }

  /* ───────────── Toast ───────────── */

  .toast-wrap {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    padding: 12px 18px;
    border-radius: var(--radius);
    background: var(--ink-2);
    color: white;
    font-size: 13.5px;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.2s ease;
  }
  .toast--success { background: var(--success); }
  .toast--error { background: var(--danger); }
  @keyframes toastIn {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ───────────── Print / PDF mode ─────────────
     html2pdf renders the .doc node at its natural size.
     ─────────────────────────────────────────────────────── */

  @media print {
    body { background: white; }
    .app-header, .form-panel, .preview-toolbar, .actions { display: none !important; }
    .app-main { padding: 0; grid-template-columns: 1fr; }
    .preview-panel { padding: 0; background: white; position: static; }
    .preview-stage { overflow: visible; }
    .doc { box-shadow: none; transform: none !important; }
  }

  /* Drafts panel (slide-down) */
  .drafts {
    position: fixed;
    top: 64px;
    right: 20px;
    width: 320px;
    max-height: 60vh;
    overflow: auto;
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    z-index: 200;
    padding: 12px;
    display: none;
  }
  .drafts[data-open='true'] { display: block; }
  .draft-item {
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .draft-item:hover { background: var(--soft); }
  .draft-item__meta { display: flex; flex-direction: column; gap: 2px; }
  .draft-item__name { font-weight: 600; font-size: 13.5px; }
  .draft-item__when { font-size: 11.5px; color: var(--subtle); }
  .draft-item__delete {
    background: transparent;
    border: 0;
    color: var(--subtle);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
  }
  .draft-item__delete:hover { color: var(--danger); background: var(--danger-bg); }
  .drafts-empty {
    padding: 30px 12px;
    text-align: center;
    color: var(--subtle);
    font-size: 13px;
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-header__inner">
    <a class="brand" href="#" aria-label="My Mechanic QLD">
      <span class="brand__mark">
        <img id="brandLogo" alt="" />
      </span>
      <span>
        My Mechanic QLD
        <span class="brand__sub">Invoice Generator</span>
      </span>
    </a>

    <div class="actions">
      <button class="btn btn--ghost" id="newBtn" title="New invoice">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New
      </button>
      <button class="btn" id="saveBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save draft
      </button>
      <button class="btn" id="loadBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-7l-2-2H5a2 2 0 0 0-2 2z"/></svg>
        Drafts
      </button>
      <button class="btn" id="printBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
      <button class="btn btn--primary" id="pdfBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export PDF
      </button>
    </div>
  </div>
</header>

<div class="drafts" id="draftsPanel">
  <div id="draftsList"></div>
</div>

<main class="app-main">

  <!-- ───────────── FORM PANEL ───────────── -->
  <aside class="panel form-panel">

    <section class="form-section">
      <header class="form-section__head">
        <h2 class="form-section__title">Customer</h2>
      </header>
      <div class="field" style="margin-bottom: 12px;">
        <label for="custName">Name</label>
        <input id="custName" type="text" placeholder="Clinton Case" data-bind="customer.name" />
      </div>
      <div class="field">
        <label for="custAddr">Billing address</label>
        <textarea id="custAddr" rows="3" placeholder="201/56 Caloola Dr, Tweed Heads&#10;NSW 2485&#10;Australia" data-bind="customer.address"></textarea>
      </div>
    </section>

    <section class="form-section">
      <header class="form-section__head">
        <h2 class="form-section__title">Invoice details</h2>
        <span class="form-section__hint" id="autoNumberHint"></span>
      </header>
      <div class="grid-2" style="margin-bottom: 12px;">
        <div class="field">
          <label for="invNumber">Invoice number</label>
          <input id="invNumber" type="text" placeholder="INV_20241206_0050" data-bind="invoice.number" />
        </div>
        <div class="field">
          <label for="invDate">Issue date</label>
          <input id="invDate" type="date" data-bind="invoice.date" />
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label for="invDue">Due by</label>
          <input id="invDue" type="date" data-bind="invoice.due" />
        </div>
        <div class="field">
          <label>Status</label>
          <div class="status-pills" id="statusPills">
            <button class="pill" data-status="paid" type="button">Paid in full</button>
            <button class="pill" data-status="partial" type="button">Partial</button>
            <button class="pill" data-status="outstanding" type="button">Outstanding</button>
          </div>
        </div>
      </div>
    </section>

    <section class="form-section">
      <header class="form-section__head">
        <h2 class="form-section__title">Line items</h2>
        <span class="form-section__hint">Qty × Unit price</span>
      </header>

      <div class="items-head">
        <span>Description</span>
        <span style="text-align: right;">Qty/Hrs</span>
        <span style="text-align: right;">Unit price</span>
        <span style="text-align: right;">Amount</span>
        <span></span>
      </div>

      <div id="itemsList"></div>

      <button class="add-row" id="addItem" type="button">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add line item
      </button>
    </section>

    <section class="form-section">
      <header class="form-section__head">
        <h2 class="form-section__title">GST</h2>
      </header>
      <div class="toggle-row">
        <div>
          <div style="font-weight: 600; font-size: 13.5px;">Prices include GST</div>
          <div style="font-size: 12.5px; color: var(--subtle); margin-top: 2px;">
            10% GST is calculated from the gross total
          </div>
        </div>
        <div class="toggle" id="gstToggle" data-on="true" tabindex="0" role="switch" aria-checked="true"></div>
      </div>
    </section>

    <section class="form-section">
      <header class="form-section__head">
        <h2 class="form-section__title">Receipts</h2>
        <span class="form-section__hint">Payments received</span>
      </header>

      <div class="receipts-head items-head">
        <span>Payment date</span>
        <span>Reference</span>
        <span style="text-align: right;">Amount</span>
        <span></span>
      </div>

      <div id="receiptsList"></div>

      <button class="add-row" id="addReceipt" type="button">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add receipt
      </button>
    </section>

    <section class="form-section">
      <header class="form-section__head">
        <h2 class="form-section__title">Notes (optional)</h2>
      </header>
      <div class="field">
        <textarea id="notes" rows="3" placeholder="Thank you for your business. Bank: BSB 064-000, Acc 123456789. Reference: invoice number." data-bind="notes"></textarea>
      </div>
    </section>

  </aside>

  <!-- ───────────── PREVIEW PANEL ───────────── -->
  <section class="panel preview-panel">
    <div class="preview-toolbar">
      <span>Live preview · A4</span>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomOut" title="Zoom out">−</button>
        <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
      </div>
    </div>

    <div class="preview-stage">
      <div class="doc" id="invoiceDoc">
        <!-- rendered by JS -->
      </div>
    </div>
  </section>

</main>

<div class="toast-wrap" id="toastWrap"></div>

};

/* ────────────────────────────────────────────────────────────────────
   Invoice number auto-format: INV_YYYYMMDD_NNNN
   Counter persists in localStorage so consecutive invoices increment.
   ─────────────────────────────────────────────────────────────────── */
function autoInvoiceNumber() {
  const d = new Date();
  const ymd = d.getFullYear()
    + String(d.getMonth() + 1).padStart(2, '0')
    + String(d.getDate()).padStart(2, '0');
  const counterKey = 'mmqld_invoice_counter';
  const next = (parseInt(localStorage.getItem(counterKey) || '49', 10) + 1);
  return `INV_${ymd}_${String(next).padStart(4, '0')}`;
}
function bumpInvoiceCounter() {
  const counterKey = 'mmqld_invoice_counter';
  const next = (parseInt(localStorage.getItem(counterKey) || '49', 10) + 1);
  localStorage.setItem(counterKey, String(next));
}

/* ────────────────────────────────────────────────────────────────────
   Money helpers — AUD, two decimals, comma thousands
   ─────────────────────────────────────────────────────────────────── */
const fmtMoney = (n) => '$' + (Number(n) || 0).toLocaleString('en-AU', {
  minimumFractionDigits: 2,
  maximumFractionDigits: 2,
});
const fmtDate = (s) => {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  if (isNaN(d.getTime())) return s;
  return d.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' });
};

/* ────────────────────────────────────────────────────────────────────
   Computations — single source of truth for the totals stack.
   ─────────────────────────────────────────────────────────────────── */
function compute() {
  const subtotal = state.items.reduce((s, it) => s + (it.qty * it.price), 0);
  // If "prices include GST", subtotal is gross; GST portion = subtotal * (1/11)
  // If "prices exclude GST", GST = subtotal * 0.1, and the total adds it on top.
  let gst, total;
  if (state.gstInclusive) {
    gst = subtotal * (1 / 11);
    total = subtotal;
  } else {
    gst = subtotal * 0.1;
    total = subtotal + gst;
  }
  const paid = state.receipts.reduce((s, r) => s + Number(r.amount || 0), 0);
  const outstanding = Math.max(0, total - paid);
  return { subtotal, gst, total, paid, outstanding };
}

function renderItemsList() {
  const root = document.getElementById('itemsList');
  root.innerHTML = state.items.map((it, idx) => `
    <div class="items-row" data-id="${it.id}">
      <input type="text" placeholder="Description" data-field="desc" value="${escAttr(it.desc)}" />
      <input type="number" min="0" step="0.5" placeholder="Qty" data-field="qty" value="${it.qty || ''}" style="text-align: right;" />
      <input type="number" min="0" step="0.01" placeholder="0.00" data-field="price" value="${it.price || ''}" style="text-align: right;" />
      <input type="text" class="item-amount" value="${fmtMoney(it.qty * it.price)}" readonly tabindex="-1" />
      <button class="row-remove" title="Remove" data-action="remove-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  `).join('');
}

function renderReceiptsList() {
  const root = document.getElementById('receiptsList');
  if (state.receipts.length === 0) {
    root.innerHTML = '<div style="color: var(--subtle); font-size: 13px; padding: 8px 0;">No payments yet.</div>';
    return;
  }
  root.innerHTML = state.receipts.map(r => `
    <div class="receipts-row" data-id="${r.id}">
      <input type="date" data-field="date" value="${r.date || ''}" />
      <input type="text" placeholder="PR00045" data-field="ref" value="${escAttr(r.ref)}" />
      <input type="number" min="0" step="0.01" placeholder="0.00" data-field="amount" value="${r.amount || ''}" style="text-align: right;" />
      <button class="row-remove" title="Remove" data-action="remove-receipt">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  `).join('');
}

function escAttr(s) {
  return String(s || '').replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}
function escHtml(s) {
  return String(s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
}

          <div class="doc__customer-label">Bill to</div>
          <div class="doc__customer-name">${escHtml(state.customer.name) || '—'}</div>
          <div class="doc__customer-addr">${escHtml(state.customer.address)}</div>
        </div>
        <div class="doc__invoice-meta">
          <h2 class="doc__invoice-title">Tax Invoice</h2>
          <div class="doc__invoice-row"><strong>Invoice Number</strong>${escHtml(state.invoice.number)}</div>
          <div class="doc__invoice-row"><strong>Invoice Date</strong>${fmtDate(state.invoice.date)}</div>
          <div class="doc__invoice-row"><strong>Due By</strong>${fmtDate(state.invoice.due)}</div>
          <div class="doc__status ${status.cls}">${status.label}</div>
        </div>
      </div>

      ${state.items.length === 0
        ? `<div class="doc__empty">No line items yet. Add items on the left.</div>`
        : `<table class="doc__table">
            <thead>
              <tr>
                <th></th>
                <th>Qty/Hrs</th>
                <th>Unit Price</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody>
              ${state.items.map(it => `
                <tr>
                  <td class="desc">${escHtml(it.desc) || '<span style="color:var(--subtle);">Untitled item</span>'}</td>
                  <td>${it.qty}</td>
                  <td>${fmtMoney(it.price)}</td>
                  <td>${fmtMoney(it.qty * it.price)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`
      }

      <div class="doc__totals">
        <div>
          ${state.notes.trim()
            ? `<div class="doc__notes">
                <div class="doc__notes-label">Notes</div>
                ${escHtml(state.notes)}
              </div>`
            : ''
          }
        </div>
        <div class="doc__totals-stack">
          ${state.gstInclusive
            ? `<div class="doc__totals-row"><span>Subtotal</span><span>${fmtMoney(t.subtotal)}</span></div>
               <div class="doc__totals-row"><span>Includes GST (10%)</span><span>${fmtMoney(t.gst)}</span></div>`
            : `<div class="doc__totals-row"><span>Subtotal</span><span>${fmtMoney(t.subtotal)}</span></div>
               <div class="doc__totals-row"><span>GST (10%)</span><span>${fmtMoney(t.gst)}</span></div>`
          }
          <div class="doc__totals-row doc__totals-row--total"><strong>Total</strong><strong>${fmtMoney(t.total)}</strong></div>
          ${t.paid > 0 ? `<div class="doc__totals-row doc__totals-row--paid"><span>Balance Paid</span><strong>${fmtMoney(t.paid)}</strong></div>` : ''}
          <div class="doc__totals-row ${t.outstanding > 0 ? 'doc__totals-row--outstanding' : ''}"><strong>Outstanding</strong><strong>${fmtMoney(t.outstanding)}</strong></div>
        </div>
      </div>

      ${state.receipts.length > 0 ? `
        <div class="doc__receipts">
          <div class="doc__receipts-label">Receipts</div>
          <table class="doc__receipts-table">
            <thead>
              <tr>
                <th>Payment date</th>
                <th>Reference</th>
                <th>Amount paid</th>
              </tr>
            </thead>
            <tbody>
              ${state.receipts.map(r => `
                <tr>
                  <td>${fmtDate(r.date)}</td>
                  <td>${escHtml(r.ref) || '—'}</td>
                  <td>${fmtMoney(r.amount)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      ` : ''}
    </div>

    <div class="doc__footer-strip"></div>
    <footer class="doc__footer">
      <a href="https://${BUSINESS.website}">${BUSINESS.website}</a> · Thank you for your business
    </footer>
  `;

  document.getElementById('invoiceDoc').innerHTML = html;
}

function render() {
  renderForm();
  renderPreview();
}

/* ────────────────────────────────────────────────────────────────────
   Event wiring
   ─────────────────────────────────────────────────────────────────── */

// Top-level fields with data-bind
document.addEventListener('input', (e) => {
  const t = e.target;
  if (t.matches('[data-bind]')) {
    const path = t.dataset.bind.split('.');
    let obj = state;
    for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];
    obj[path[path.length - 1]] = t.value;
    renderPreview();
    return;
  }
  // Line items
  const itemRow = t.closest('.items-row');
  if (itemRow) {
    const id = itemRow.dataset.id;
    const field = t.dataset.field;
    const item = state.items.find(i => i.id === id);
    if (!item) return;
    if (field === 'qty' || field === 'price') {
      item[field] = Number(t.value) || 0;
    } else {
      item[field] = t.value;
    }
    // Update amount cell inline without re-rendering whole list (preserves focus)
    const amountCell = itemRow.querySelector('.item-amount');
    if (amountCell) amountCell.value = fmtMoney(item.qty * item.price);
    renderPreview();
    return;
  }
  // Receipts
  const recRow = t.closest('.receipts-row');
  if (recRow) {
    const id = recRow.dataset.id;
    const field = t.dataset.field;
    const rec = state.receipts.find(r => r.id === id);
    if (!rec) return;
    rec[field] = field === 'amount' ? Number(t.value) || 0 : t.value;
    renderPreview();
  }
});

document.addEventListener('click', (e) => {
  const t = e.target.closest('[data-action]');
  if (!t) return;
  const action = t.dataset.action;

  if (action === 'remove-item') {
    const row = t.closest('.items-row');
    state.items = state.items.filter(i => i.id !== row.dataset.id);
    renderItemsList();
    renderPreview();
  }
  if (action === 'remove-receipt') {
    const row = t.closest('.receipts-row');
    state.receipts = state.receipts.filter(r => r.id !== row.dataset.id);
    renderReceiptsList();
    renderPreview();
  }
});

document.getElementById('addItem').addEventListener('click', () => {
  state.items.push(blankItem());
  renderItemsList();
  renderPreview();
});

document.getElementById('addReceipt').addEventListener('click', () => {
  state.receipts.push(blankReceipt());
  renderReceiptsList();
  renderPreview();
});

document.getElementById('gstToggle').addEventListener('click', (e) => {
  state.gstInclusive = !(e.currentTarget.dataset.on === 'true');
  e.currentTarget.dataset.on = state.gstInclusive ? 'true' : 'false';
  e.currentTarget.setAttribute('aria-checked', String(state.gstInclusive));
  renderPreview();
});

document.getElementById('statusPills').addEventListener('click', (e) => {
  const p = e.target.closest('.pill');
  if (!p) return;
  state.invoice.status = p.dataset.status;
  renderPills();
  renderPreview();
});

/* ────────────────────────────────────────────────────────────────────
   Toolbar actions
   ─────────────────────────────────────────────────────────────────── */

document.getElementById('newBtn').addEventListener('click', () => {
  if (!confirm('Start a new invoice? Unsaved changes will be lost.')) return;
  state = {
    customer: { name: '', address: '' },
    invoice: { number: autoInvoiceNumber(), date: today(), due: today(), status: 'outstanding' },
    items: [blankItem()],
    gstInclusive: true,
    receipts: [],
    notes: '',
  };
  render();
  toast('New invoice started.');
});

document.getElementById('saveBtn').addEventListener('click', () => {
  saveDraft();
});

document.getElementById('loadBtn').addEventListener('click', () => {
  const panel = document.getElementById('draftsPanel');
  const isOpen = panel.dataset.open === 'true';
  if (isOpen) {
    panel.dataset.open = 'false';
  } else {
    renderDraftsList();
    panel.dataset.open = 'true';
  }
});

document.addEventListener('click', (e) => {
  if (e.target.closest('#loadBtn') || e.target.closest('#draftsPanel')) return;
  document.getElementById('draftsPanel').dataset.open = 'false';
});

document.getElementById('printBtn').addEventListener('click', () => window.print());

document.getElementById('pdfBtn').addEventListener('click', exportPdf);

/* ────────────────────────────────────────────────────────────────────
   Drafts (localStorage)
   ─────────────────────────────────────────────────────────────────── */

const DRAFTS_KEY = 'mmqld_invoice_drafts_v1';

function loadDrafts() {
  try { return JSON.parse(localStorage.getItem(DRAFTS_KEY) || '[]'); }
  catch { return []; }
}

function saveDraft() {
  const drafts = loadDrafts();
  const t = compute();
  const draftId = state.invoice.number || crypto.randomUUID();
  const draft = {
    id: draftId,
    name: state.customer.name || 'Untitled',
    number: state.invoice.number,
    total: t.total,
    savedAt: Date.now(),
    state: JSON.parse(JSON.stringify(state)),
  };
  const idx = drafts.findIndex(d => d.id === draftId);
  if (idx >= 0) drafts[idx] = draft;
  else drafts.unshift(draft);
  // Keep last 30
  const trimmed = drafts.slice(0, 30);
  localStorage.setItem(DRAFTS_KEY, JSON.stringify(trimmed));
  toast('Draft saved.', 'success');
}

function renderDraftsList() {
  const drafts = loadDrafts();
  const list = document.getElementById('draftsList');
  if (drafts.length === 0) {
    list.innerHTML = '<div class="drafts-empty">No saved drafts yet.</div>';
    return;
  }
  list.innerHTML = drafts.map(d => `
    <div class="draft-item" data-id="${d.id}">
      <div class="draft-item__meta">
        <div class="draft-item__name">${escHtml(d.name)} · ${fmtMoney(d.total)}</div>
        <div class="draft-item__when">${escHtml(d.number)} · ${new Date(d.savedAt).toLocaleString('en-AU')}</div>
      </div>
      <button class="draft-item__delete" data-action="delete-draft" data-id="${d.id}" title="Delete">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
    </div>
  `).join('');

  list.querySelectorAll('.draft-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('[data-action="delete-draft"]')) return;
      const drafts = loadDrafts();
      const d = drafts.find(x => x.id === el.dataset.id);
      if (!d) return;
      state = d.state;
      // Re-hydrate items/receipts with fresh IDs if missing
      state.items.forEach(it => { if (!it.id) it.id = crypto.randomUUID(); });
      state.receipts.forEach(r => { if (!r.id) r.id = crypto.randomUUID(); });
      render();
      document.getElementById('draftsPanel').dataset.open = 'false';
      toast('Draft loaded.');
    });
  });

  list.querySelectorAll('[data-action="delete-draft"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const drafts = loadDrafts().filter(d => d.id !== btn.dataset.id);
      localStorage.setItem(DRAFTS_KEY, JSON.stringify(drafts));
      renderDraftsList();
    });
  });
}

/* ────────────────────────────────────────────────────────────────────
   PDF export — html2pdf wraps html2canvas + jsPDF.
   We render the .doc node at native 794×1123 px and let it scale to
   A4. Pagination is automatic when content overflows.
   ─────────────────────────────────────────────────────────────────── */

async function exportPdf() {
  if (typeof html2pdf === 'undefined') {
    toast('PDF library still loading, try again in a second.', 'error');
    return;
  }
  const node = document.getElementById('invoiceDoc').cloneNode(true);
  // Wrap so the PDF gets correct centered layout
  const wrapper = document.createElement('div');
  wrapper.style.background = 'white';
  wrapper.appendChild(node);
  // Hide preview-only transform on the clone
  node.style.transform = 'none';
  node.style.boxShadow = 'none';

  const filename = (state.invoice.number || 'invoice') + '.pdf';
  toast('Generating PDF…');
  try {
    await html2pdf().set({
      margin: 0,
      filename,
      image: { type: 'jpeg', quality: 0.95 },
      html2canvas: { scale: 2, useCORS: true, backgroundColor: '#FFFFFF' },
      jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait', hotfixes: ['px_scaling'] },
      pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
    }).from(wrapper).save();
    bumpInvoiceCounter();
    toast('PDF downloaded.', 'success');
  } catch (err) {
    console.error(err);
    toast('PDF export failed: ' + err.message, 'error');
  }
}

/* ────────────────────────────────────────────────────────────────────
   Toasts
   ─────────────────────────────────────────────────────────────────── */

function toast(msg, kind) {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' toast--' + kind : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

/* ────────────────────────────────────────────────────────────────────
   Zoom (preview only — does not affect PDF output)
   ─────────────────────────────────────────────────────────────────── */

let zoomLevel = 0.78; // fits 794px into ~620px column on desktop
function applyZoom() {
  document.getElementById('invoiceDoc').style.transform = `scale(${zoomLevel})`;
  // Also scale the container so the scaled doc takes less space
  const stage = document.querySelector('.preview-stage');
  stage.style.minHeight = (1123 * zoomLevel + 24) + 'px';
}
document.getElementById('zoomIn').addEventListener('click', () => {
  zoomLevel = Math.min(1.4, zoomLevel + 0.1);
  applyZoom();
});
document.getElementById('zoomOut').addEventListener('click', () => {
  zoomLevel = Math.max(0.4, zoomLevel - 0.1);
  applyZoom();
});

/* Initial paint */
render();
applyZoom();

/* On window resize, choose a sensible default zoom */
function autoFitZoom() {
  const stage = document.querySelector('.preview-stage');
  if (!stage) return;
  const available = stage.clientWidth - 32;
  if (available < 794) {
    zoomLevel = Math.max(0.4, Math.min(1, available / 794));
    applyZoom();
  } else {
    zoomLevel = 1;
    applyZoom();
  }
}
window.addEventListener('resize', autoFitZoom);
autoFitZoom();
</script>
